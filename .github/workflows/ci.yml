name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nimbusdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: services/metadata-service/go.sum

      - name: Install dependencies
        run: |
          cd services/metadata-service
          go mod download

      - name: Run Tests
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/nimbusdb?sslmode=disable
        run: |
          cd services/metadata-service
          go test -v ./...
